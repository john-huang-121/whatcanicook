{% extends "base.html" %}

{% block content %}
<main class="min-h-screen bg-orange-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-md rounded-xl bg-white p-6 shadow-md">
        <h1 class="text-3xl font-semibold text-gray-900">Log In</h1>

        <form method="post" action="{% url 'account_login' %}" class="mt-6">
            {% csrf_token %}
            {{ form.as_p }}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
            {% endif %}
            <button type="submit" class="rounded bg-green-600 px-4 py-2 text-white">Log In</button>
        </form>

        <p class="mt-4 text-sm text-gray-600">
            Need an account?
            <a href="{% url 'account_signup' %}" class="font-semibold text-gray-900">Sign up</a>
        </p>
    </div>
</main>
{% endblock content %}
