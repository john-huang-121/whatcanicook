{% extends "base.html" %}

{% block content %}
<main class="min-h-screen bg-orange-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-xl rounded-xl bg-white p-6 shadow-md">
        <h1 class="text-2xl font-semibold text-gray-900">Delete Recipe</h1>
        <p class="mt-4 text-gray-700">
            Delete <span class="font-semibold">{{ recipe.title }}</span>? This cannot be undone.
        </p>

        <form method="post" class="mt-6 flex items-center gap-4">
            {% csrf_token %}
            <button type="submit" class="rounded bg-red-600 px-4 py-2 text-white">Delete</button>
            <a href="{% url 'recipes:detail' recipe.id %}" class="text-gray-700">Cancel</a>
        </form>
    </div>
</main>
{% endblock content %}
